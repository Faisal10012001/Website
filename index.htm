<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Faisal Khan Portfolio</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
   <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
   <style>
      html { scroll-behavior: smooth; }
      body { background: #000; margin: 0; min-height: 100vh; font-family: Lato, sans-serif; color: white; }
      [id] { scroll-margin-top: 80px; }

      .navbar { background-color: #000 !important; border: none; padding: 10px 0; }
      .navbar .navbar-brand { display: flex; align-items: center; border: 2px solid #dedcdc; padding: 5px 15px; border-radius: 8px; color: #dedcdc !important; transition: all 0.6s ease; margin-top: 5px; }
      .navbar .navbar-brand:hover { color: #ffd700 !important; border-color: #ffd700 !important; }
      .navbar .nav>li>a { color: #dedcdc !important; transition: 0.6s; border: 2px solid transparent; border-radius: 8px; margin: 0 5px; }
      .navbar .nav>li>a:hover { color: #ffd700 !important; border-color: #ffd700 !important; }
      .navbar-logo { height: 25px; margin-right: 10px; }

      .main-content { display: flex; align-items: center; justify-content: space-around; padding: 50px 5%; flex-wrap: wrap; gap: 20px; }
      .intro-section { flex: 1; min-width: 300px; }
      h1 { font-size: 5vmin; color: #8bf; font-weight: 700; }
      .intro-text { font-size: 4vmin; color: #8bf; font-weight: 700; margin-bottom: 15px; }
      .description { font-family: cursive; font-size: 18px; max-width: 500px; color: white; }

      @keyframes typing {
         0%, 27% { content: ""; }
         1%, 26% { content: "D"; }
         2%, 25% { content: "De"; }
         3%, 24% { content: "Dev"; }
         4%, 23% { content: "Deve"; }
         5%, 22% { content: "Devel"; }
         6%, 21% { content: "Develo"; }
         7%, 20% { content: "Develop"; }
         8%, 19% { content: "Develope"; }
         9%, 18% { content: "Developer"; }
         30%, 51% { content: ""; }
         55%, 74% { content: "C"; }
         57%, 72% { content: "Co"; }
         59%, 70% { content: "Cod"; }
         61%, 68% { content: "Code"; }
         63%, 66% { content: "Coder"; }
      }

      .typewriter::before { content: ""; animation: typing 13.5s infinite; }

      .button_slide { padding: 1.1em 2.5em; font-family: monospace; cursor: pointer; color: white; background-color: #8bf; border: none; border-radius: 10px; position: relative; overflow: hidden; transition: color 0.4s ease; }
      .slide_right:hover { color: #8bf; background: white; border: 2px solid orange; }

      .img-section { display: flex; justify-content: center; align-items: center; position: relative; max-width: 400px; flex: 1; }
      .img-box { padding: 20px; border-radius: 15px; background: #8bf; position: relative; box-shadow: 0 0 20px rgba(136,187,255,0.4); }
      .img-box img { width: 250px; height: 250px; border-radius: 15px; object-fit: cover; display: block; }

      .projects-section { padding: 80px 5%; }
      .projects-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
      .project-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 30px; text-align: center; transition: 0.5s; }
      .project-card:hover { border-color: #ffd700; transform: translateY(-10px); }
      .project-card i { font-size: 45px; color: #8bf; margin-bottom: 15px; }
      .project-card h3 { color: #ffd700; margin-bottom: 15px; }
      .project-card p { color: white; margin-bottom: 20px; }
      .btn-project { margin-top: 15px; display: inline-block; padding: 8px 25px; border: 1px solid #8bf; color: #8bf; text-decoration: none; border-radius: 5px; }
      .btn-project:hover { background: #8bf; color: #000; text-decoration: none; }
   </style>
</head>

<body>

<nav class="navbar navbar-default navbar-static-top">
   <div class="container">
      <div class="navbar-header">
         <a class="navbar-brand" href="#">Faisal Khan</a>
      </div>
      <div class="collapse navbar-collapse">
         <ul class="nav navbar-nav navbar-right">
            <li><a href="#projects">Projects</a></li>
         </ul>
      </div>
   </div>
</nav>

<div class="main-content">
   <div class="intro-section">
      <h1>Hi! I'm Faisal Khan</h1>
      <div class="intro-text">and I'm a <span class="typewriter"></span></div>
      <p class="description">Full Stack Developer</p>
   </div>
</div>

<div class="projects-section" id="projects">
   <h2 style="text-align:center;">Projects</h2>

   <div class="projects-container">

      <div class="project-card">
         <i class="fa-solid fa-book"></i>
         <h3>Dictionary</h3>
      </div>

      <div class="project-card">
         <i class="fa-solid fa-heart"></i>
         <h3>Matrimonial</h3>
      </div>

      <div class="project-card">
         <i class="fa-solid fa-cart-shopping"></i>
         <h3>Cart</h3>
      </div>

      <div class="project-card">
         <i class="fa-solid fa-beer-mug-empty"></i>
         <h3>Bar</h3>
      </div>

      <div class="project-card">
         <i class="bi bi-bank"></i>
         <h3>EMI Calculator</h3>
      </div>

      <div class="project-card">
         <i class="bi bi-cloud-sun"></i>
         <h3>Weather App</h3>
      </div>

   </div>
</div>

</body>
</html>
